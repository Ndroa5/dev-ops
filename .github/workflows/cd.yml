name: CD

# Only fires on an actual PR merge into main - not on every push (pushing directly to main
# shouldn't happen per the git workflow in CLAUDE.md, but even if it did, this workflow
# deliberately wouldn't react to it). `github.event.pull_request.merged == true` is what
# distinguishes "merged" from "closed without merging".
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & push (${{ matrix.service }})
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
          - catalog-service
          - order-service
          - notification-service
    steps:
      - name: Check out merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (tagged with short SHA and latest)
        run: |
          SHA="${{ github.event.pull_request.merge_commit_sha }}"
          SHORT_SHA="${SHA:0:7}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          docker build -f ${{ matrix.service }}/Dockerfile \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/devops-${{ matrix.service }}:${SHORT_SHA}" \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/devops-${{ matrix.service }}:latest" \
            .

      - name: Push both tags to Docker Hub
        run: docker push --all-tags "${{ secrets.DOCKERHUB_USERNAME }}/devops-${{ matrix.service }}"

  # Runs on this project's own self-hosted runner (a Windows service on the dev machine, not a
  # GitHub-hosted runner) because its whole job is to actually leave the deployed stack running
  # afterward - a GitHub-hosted runner is destroyed the moment the job ends, so nothing deployed
  # there could ever persist. This is the "local" deployment path from the spec (item 8 permits
  # local as an equal alternative to cloud); the runner turns the previously-manual
  # `docker compose -f docker-compose.prod.yml pull && up -d` step into something that now happens
  # automatically on every merge to main, satisfying "automatski deploy nove verzije aplikacije"
  # for real instead of just building+pushing images and discarding the result.
  post-deploy-health-check:
    name: Post-deploy health check
    needs: build-and-push
    if: github.event.pull_request.merged == true
    runs-on: self-hosted
    steps:
      - name: Check out merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      # Native PowerShell, not bash: the bare `shell: bash` keyword resolved to
      # C:\Windows\System32\bash.exe (the WSL launcher stub, no distro installed) instead of Git
      # Bash on this Windows runner, and pointing `shell:` at Git Bash's actual .exe path directly
      # also failed - the runner's custom-shell parsing splits the shell command on whitespace,
      # and "C:\Program Files\Git\..." has a space in "Program Files", so it got mis-tokenized
      # ("Second path fragment must not be a drive or UNC name"). Native PowerShell (the Windows
      # runner's actual default shell) sidesteps both problems entirely.
      - name: Compute short SHA tag
        shell: powershell
        run: |
          $sha = "${{ github.event.pull_request.merge_commit_sha }}"
          $short = $sha.Substring(0, 7)
          "TAG=$short" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Pull freshly-published images and (re)start the stack
        shell: powershell
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker compose -f docker-compose.prod.yml pull
          if ($LASTEXITCODE -ne 0) { exit 1 }
          docker compose -f docker-compose.prod.yml up -d --wait --wait-timeout 180
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Hit each service's /actuator/health endpoint
        shell: powershell
        run: |
          $ports = 9080, 9081, 9082, 9083, 9084
          foreach ($port in $ports) {
            Write-Host "Checking service on port $port..."
            $response = Invoke-RestMethod -Uri "http://localhost:$port/actuator/health"
            Write-Host ($response | ConvertTo-Json -Compress)
            if ($response.status -ne "UP") {
              Write-Host "Service on port $port is not UP"
              exit 1
            }
          }
          Write-Host "All 5 services report UP."

      # Deliberately no teardown step here anymore - the whole point of moving this job to a
      # self-hosted runner was to leave the freshly-deployed stack running instead of discarding
      # it. If a health check fails above, the previous (still-running) containers are left alone
      # rather than torn down, since `docker compose up -d` only recreates containers whose image
      # actually changed - a bad new image failing health checks doesn't take down a working prior
      # deployment.
