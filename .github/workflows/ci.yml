name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test (mvn clean install)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # SonarCloud needs full history (not the default shallow clone) for accurate blame /
          # new-code-period analysis.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # GitHub-hosted ubuntu runners ship Docker preinstalled and reachable on the standard
      # unix socket, so Testcontainers auto-detects it with no DOCKER_HOST override needed here
      # (unlike the Windows/Docker Desktop workaround documented in CLAUDE.md for local dev).
      - name: Build and test all modules
        run: mvn --batch-mode --no-transfer-progress clean install

      - name: Upload service jars
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: |
            api-gateway/target/*.jar
            user-service/target/*.jar
            catalog-service/target/*.jar
            order-service/target/*.jar
            notification-service/target/*.jar
          retention-days: 7
          if-no-files-found: error

      # Runs once at the reactor root, after the build above - the sonar-maven-plugin walks all
      # 5 modules automatically (standard Maven multi-module layout, no per-module config needed)
      # and aggregates them into one SonarCloud project.
      - name: SonarCloud static analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn --batch-mode org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=Ndroa5_dev-ops

  docker-build:
    name: Build Docker image (${{ matrix.service }})
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - user-service
          - catalog-service
          - order-service
          - notification-service
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Build only — confirms each Dockerfile still builds cleanly. Pushing to a registry is
      # the CD phase, not this one.
      - name: Build ${{ matrix.service }} image
        run: docker build -f ${{ matrix.service }}/Dockerfile -t devops-project/${{ matrix.service }}:ci .
