server:
  port: 9080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:9081}
          predicates:
            - Path=/api/auth/**,/api/users/**
        - id: catalog-service
          uri: ${CATALOG_SERVICE_URL:http://localhost:9082}
          predicates:
            - Path=/api/books/**
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:9083}
          predicates:
            - Path=/api/orders/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:9084}
          predicates:
            - Path=/api/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  level:
    org.springframework.cloud.gateway: INFO
