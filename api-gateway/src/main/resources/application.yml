server:
  port: 9080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:9081
          predicates:
            - Path=/api/auth/**,/api/users/**
        - id: catalog-service
          uri: http://localhost:9082
          predicates:
            - Path=/api/books/**
        - id: order-service
          uri: http://localhost:9083
          predicates:
            - Path=/api/orders/**
        - id: notification-service
          uri: http://localhost:9084
          predicates:
            - Path=/api/notifications/**

logging:
  level:
    org.springframework.cloud.gateway: INFO
