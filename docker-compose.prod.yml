# Runs the published Docker Hub images instead of building from source.
# This is the "deploy" story: `docker compose -f docker-compose.prod.yml pull && up -d`
# pulls whatever the CD pipeline last pushed to Docker Hub and runs the whole stack.
#
# Distinct network/volume/container names and infra ports from docker-compose.yml (the
# build-from-source dev compose file) and from the manual devops-postgres/devops-rabbitmq
# containers, so all three setups can coexist on the same machine without port/name conflicts.
# App service ports (9080-9084) are the same as the other setups on purpose — they represent the
# same services and aren't meant to run side by side with them.

networks:
  devops-prod-network:
    driver: bridge

volumes:
  prod-postgres-data:
  prod-rabbitmq-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: prod-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - prod-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    networks:
      - devops-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: prod-rabbitmq
    environment:
      # See docker-compose.yml for why this is set explicitly (avoids a first-boot
      # .erlang.cookie permission race seen on some Docker Desktop setups).
      RABBITMQ_ERLANG_COOKIE: devops-project-cookie
    ports:
      - "5675:5672"
      - "15675:15672"
    volumes:
      - prod-rabbitmq-data:/var/lib/rabbitmq
    networks:
      - devops-prod-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 45s

  user-service:
    image: ${DOCKERHUB_USERNAME:?set DOCKERHUB_USERNAME}/devops-user-service:${TAG:-latest}
    container_name: prod-user-service
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-this-development-secret-key-to-something-long-and-random
    ports:
      - "9081:9081"
    networks:
      - devops-prod-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  catalog-service:
    image: ${DOCKERHUB_USERNAME:?set DOCKERHUB_USERNAME}/devops-catalog-service:${TAG:-latest}
    container_name: prod-catalog-service
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "9082:9082"
    networks:
      - devops-prod-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  order-service:
    image: ${DOCKERHUB_USERNAME:?set DOCKERHUB_USERNAME}/devops-order-service:${TAG:-latest}
    container_name: prod-order-service
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      CATALOG_SERVICE_URL: http://catalog-service:9082
    ports:
      - "9083:9083"
    networks:
      - devops-prod-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9083/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  notification-service:
    image: ${DOCKERHUB_USERNAME:?set DOCKERHUB_USERNAME}/devops-notification-service:${TAG:-latest}
    container_name: prod-notification-service
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - "9084:9084"
    networks:
      - devops-prod-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9084/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  api-gateway:
    image: ${DOCKERHUB_USERNAME:?set DOCKERHUB_USERNAME}/devops-api-gateway:${TAG:-latest}
    container_name: prod-api-gateway
    environment:
      USER_SERVICE_URL: http://user-service:9081
      CATALOG_SERVICE_URL: http://catalog-service:9082
      ORDER_SERVICE_URL: http://order-service:9083
      NOTIFICATION_SERVICE_URL: http://notification-service:9084
    ports:
      - "9080:9080"
    networks:
      - devops-prod-network
    depends_on:
      user-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
