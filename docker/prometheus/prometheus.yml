global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:9080"]

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service:9081"]

  - job_name: catalog-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["catalog-service:9082"]

  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["order-service:9083"]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:9084"]
