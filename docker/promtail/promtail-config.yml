server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Only discovers containers explicitly labeled devops.logging=true (set on our 5 app services
  # in docker-compose.yml) - this machine runs other, unrelated Docker projects side by side, and
  # scraping every container on the host would pull their logs into this stack's Loki too.
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["devops.logging=true"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container_name"
      - source_labels: ["__meta_docker_container_label_devops_service"]
        target_label: "service_name"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "logstream"
