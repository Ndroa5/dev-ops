server:
  port: 9084

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5433/notificationdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.university.notificationservice: DEBUG
