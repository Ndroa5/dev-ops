server:
  port: 9083

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/orderdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5673}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    template:
      # Spring AMQP does not enable Micrometer observation (and therefore trace propagation
      # through message headers) by default - this has to be turned on explicitly. See
      # notification-service's spring.rabbitmq.listener.simple.observation-enabled for the
      # consumer-side counterpart.
      observation-enabled: true

catalog-service:
  url: ${CATALOG_SERVICE_URL:http://localhost:9082}

app:
  rabbitmq:
    exchange: order-events-exchange
    routing-key: order.created

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  level:
    com.university.orderservice: DEBUG
