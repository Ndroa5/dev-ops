server:
  port: 9083

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/orderdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5673}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

catalog-service:
  url: ${CATALOG_SERVICE_URL:http://localhost:9082}

app:
  rabbitmq:
    exchange: order-events-exchange
    routing-key: order.created

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.university.orderservice: DEBUG
