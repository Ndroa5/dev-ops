server:
  port: 9081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5433/userdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: "change-this-development-secret-key-to-something-long-and-random"
  expiration-ms: 3600000

logging:
  level:
    com.university.userservice: DEBUG
